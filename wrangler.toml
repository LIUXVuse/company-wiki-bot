name = "company-wiki-bot"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "company-wiki-db"
database_id = "c651cd17-670f-4659-865f-d1728d68ed48"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "company-wiki"

[vars]
COMPANY_NAME = "我的公司"

# ── LLM 設定（改這三行換模型）──────────────────────────────
# DeepSeek V4 Flash ✅ 目前啟用
LLM_PROVIDER = "deepseek"
LLM_MODEL = "deepseek-v4-flash"
LLM_BASE_URL = "https://api.deepseek.com"

# Kimi K2（中文強、128k context，需另外申請 key）
# LLM_PROVIDER = "kimi"
# LLM_MODEL = "kimi-k2"
# LLM_BASE_URL = "https://api.moonshot.cn/v1"

# NVIDIA Nemotron
# LLM_PROVIDER = "nvidia"
# LLM_MODEL = "nvidia/llama-3.1-nemotron-ultra-253b-v1"
# LLM_BASE_URL = "https://integrate.api.nvidia.com/v1"
# ─────────────────────────────────────────────────────────

MINERU_USE_API = "true"
BOT_ACCESS = "public"              # "public" 任何人可問 | "private" 只有白名單可用

# 知識庫分類設定（可自訂，改完重新 deploy 即生效）
# key = 內部識別碼（英文），name = 顯示名稱，desc = 給 LLM 判斷用的說明
WIKI_CATEGORIES = '[{"key":"policy","name":"政策法規","desc":"政府函文、法規、公文"},{"key":"procedure","name":"作業程序","desc":"SOP、作業流程、指導原則"},{"key":"staff","name":"人員資格","desc":"人員訓練、認證、資格規定"},{"key":"billing","name":"費用給付","desc":"收費標準、給付基準、審核規定"},{"key":"faq","name":"常見問答","desc":"常見問題與解答"}]'

# 以下為 secrets，不要寫在這裡，用指令設定：
# wrangler secret put TELEGRAM_BOT_TOKEN
# wrangler secret put LLM_API_KEY
# wrangler secret put MINERU_API_TOKEN   (選填，留空用免費輕量版)
# wrangler secret put INGEST_SECRET      (本機腳本上傳用，見 scripts/ingest_pdfs.py)
